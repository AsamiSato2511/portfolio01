spring:
  application:
    name: bloomletter-backend
  datasource:
    url: jdbc:h2:mem:bloomletter;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
  jackson:
    time-zone: Asia/Tokyo

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

server:
  error:
    include-message: always

logging:
  level:
    com.bloomletter.backend: INFO

bloomletter:
  ai:
    enabled: false
    base-url: ${BLOOMLETTER_AI_BASE_URL:https://api.openai.com/v1/chat/completions}
    model: ${BLOOMLETTER_AI_MODEL:gpt-4o-mini}
    api-key: ${OPENAI_API_KEY:}
